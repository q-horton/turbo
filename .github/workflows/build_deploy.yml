name: Build, Push & Deploy Discord Bot

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  # GitHub's own container registry — free for public repos, included for private.
  # Alternative: docker.io (Docker Hub) or a self-hosted registry.
  REGISTRY: ghcr.io
  # github.repository is "youruser/yourrepo", lowercased automatically below
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    # Needed so the job can push to GHCR using the built-in GITHUB_TOKEN
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          # DECISION: GITHUB_TOKEN is auto-provided by Actions — no manual
          # secret needed for GHCR. Docker Hub would require a PAT in secrets.

      - name: Extract image metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
          # DECISION: We tag with the short commit SHA (e.g. "sha-a1b2c3d")
          # AND the branch name ("main"/"staging"). The deploy job uses the
          # SHA tag so each deploy is pinned to an exact, immutable image.
          # The branch tag is a convenience pointer for humans.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # DECISION: Buildx enables BuildKit, which is required for multi-stage
        # builds and layer caching. Also required for the cache-to/cache-from
        # flags below.

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # DECISION: `type=gha` stores the Docker layer cache in GitHub's
          # Actions cache. This means the dependency-caching trick in the
          # Dockerfile (dummy main.rs) is effective across workflow runs —
          # deps only recompile when Cargo.toml/Cargo.lock changes.

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    # environment: ${{ github.ref_name == 'master' && 'production' || 'staging' }}

    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy compose file to VPS
        run: |
          scp compose.yml deploy@${{ secrets.VPS_HOST }}:/opt/turbo/compose.yml

      - name: Pull image and restart container
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}
          REGISTRY: ${{ env.REGISTRY }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh deploy@${{ secrets.VPS_HOST }} << EOF
            set -euo pipefail

            # Log in to GHCR so the VPS can pull the image
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # Inject the pinned image tag into the compose file, then bring
            # the service up. --pull always ensures the new image is used even
            # if a container with the same name is already running.
            cd /opt/turbo
            IMAGE_TAG=$IMAGE docker compose up -d --pull always --wait

            # --wait blocks until the healthcheck reports healthy (or fails),
            # so we get a meaningful success/failure signal rather than just
            # "container started". Requires Docker Compose 2.1+.
            echo "✅ Deployment complete"
          EOF
